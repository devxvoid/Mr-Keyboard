name: 02 Build Termux Keyboard APK

on:
  workflow_dispatch:
  push:
    paths:
      - "settings.gradle"
      - "build.gradle"
      - "app/**"
      - ".github/workflows/02-build-termux-keyboard-apk.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build APK With Logs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK with logs
        shell: bash
        run: |
          set -o pipefail
          gradle clean assembleDebug --stacktrace --info 2>&1 | tee build-log.txt

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-build-logs
          path: build-log.txt

      - name: Upload generated source artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-source-root
          path: |
            settings.gradle
            build.gradle
            app
            build-log.txt
