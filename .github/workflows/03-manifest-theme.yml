name: Manifest Theme

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create manifest and resources
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > app/src/main/AndroidManifest.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <application
        android:allowBackup="true"
        android:label="MrRobot Keyboard"
        android:theme="@style/AppTheme"
        android:supportsRtl="true">

        <service
            android:name="com.robot.mrkeyboard.TermuxKeyboardService"
            android:label="MrRobot Keyboard"
            android:permission="android.permission.BIND_INPUT_METHOD"
            android:exported="true">

            <intent-filter>
                <action android:name="android.view.InputMethod" />
            </intent-filter>

            <meta-data
                android:name="android.view.im"
                android:resource="@xml/method" />
        </service>
    </application>
</manifest>
EOF

          cat > app/src/main/res/xml/method.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<input-method xmlns:android="http://schemas.android.com/apk/res/android" />
EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
        <item name="android:windowNoTitle">true</item>
        <item name="android:windowActionBar">false</item>
        <item name="android:fontFamily">monospace</item>
        <item name="android:colorAccent">#00FF66</item>
        <item name="android:navigationBarColor">#050505</item>
        <item name="android:windowLightNavigationBar">false</item>
    </style>
</resources>
EOF

          cat > app/src/main/res/drawable/key_hacker.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<selector xmlns:android="http://schemas.android.com/apk/res/android">
    <item android:state_selected="true">
        <shape android:shape="rectangle">
            <solid android:color="#003B1F" />
            <stroke android:width="1dp" android:color="#00FF66" />
            <corners android:radius="12dp" />
        </shape>
    </item>
    <item android:state_pressed="true">
        <shape android:shape="rectangle">
            <solid android:color="#003B1F" />
            <stroke android:width="1dp" android:color="#00FF66" />
            <corners android:radius="12dp" />
        </shape>
    </item>
    <item>
        <shape android:shape="rectangle">
            <solid android:color="#08100C" />
            <stroke android:width="1dp" android:color="#143D24" />
            <corners android:radius="12dp" />
        </shape>
    </item>
</selector>
EOF

      - name: Commit manifest and resources
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/src/main
          git commit -m "Add manifest and keyboard theme" || echo "No changes"
          git push origin "HEAD:${GITHUB_REF_NAME}"
