name: 04 Keyboard UI

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  keyboard:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: |
          cat > app/src/main/java/com/robot/mrkeyboard/TermuxKeyboardService.kt <<EOF
package com.robot.mrkeyboard

import android.inputmethodservice.InputMethodService
import android.view.View
import android.widget.TextView

class TermuxKeyboardService : InputMethodService() {
    override fun onCreateInputView(): View {
        return TextView(this).apply {
            text = "MrRobot Keyboard Ready"
        }
    }
}
EOF

      - run: |
          git add .
          git commit -m "Keyboard added" || echo done
          git push
