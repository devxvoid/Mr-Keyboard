name: Unzip TermuxKeyboardApp Contents to Root

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    name: Extract Inner Project Files to Root
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract ZIP
        shell: bash
        run: |
          set -euo pipefail

          test -f TermuxKeyboardApp.zip

          rm -rf extracted
          mkdir -p extracted

          unzip -o TermuxKeyboardApp.zip -d extracted

      - name: Move files from TermuxKeyboardApp folder to repo root
        shell: bash
        run: |
          set -euo pipefail

          test -d extracted/TermuxKeyboardApp

          shopt -s dotglob nullglob

          # Remove workflow files from ZIP before moving.
          # GitHub Actions cannot push workflow changes using default GITHUB_TOKEN.
          rm -rf extracted/TermuxKeyboardApp/.github

          rsync -a extracted/TermuxKeyboardApp/ ./

          rm -rf extracted
          rm -f TermuxKeyboardApp.zip

      - name: Commit extracted root project
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Move TermuxKeyboardApp project files to repo root"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
