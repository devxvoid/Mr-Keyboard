name: Unzip MrRobotKeyboard v5 to Root

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    name: Extract Project to Root
    runs-on: ubuntu-latest

    env:
      ZIP_NAME: MrRobotKeyboard-v5-production-full.zip

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract ZIP
        shell: bash
        run: |
          set -euo pipefail

          test -f "$ZIP_NAME"

          rm -rf extracted
          mkdir -p extracted

          unzip -o "$ZIP_NAME" -d extracted

      - name: Move files to repo root
        shell: bash
        run: |
          set -euo pipefail

          ROOT_DIR=$(find extracted -mindepth 1 -maxdepth 1 -type d | head -n 1)

          echo "Detected root: $ROOT_DIR"

          shopt -s dotglob nullglob

          rm -rf "$ROOT_DIR/.github"

          rsync -a "$ROOT_DIR"/ ./

          rm -rf extracted
          rm -f "$ZIP_NAME"

      - name: Commit extracted project
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Import MrRobot Keyboard v5 project"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
