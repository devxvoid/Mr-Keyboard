name: Unzip Project to Root

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    name: Extract ZIP to Root
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # OPTION 1 (recommended): ZIP already in repo root
      - name: Verify ZIP exists
        run: |
          ls -la
          test -f TermuxKeyboardApp.zip

      # OPTION 2 (if ZIP is artifact, uncomment this)
      # - name: Download artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: termux-keyboard-zip

      - name: Extract ZIP into repo root
        run: |
          set -euo pipefail

          unzip -o TermuxKeyboardApp.zip -d extracted

          # Move everything to root
          shopt -s dotglob
          mv extracted/* .
          rm -rf extracted

      - name: Delete ZIP file
        run: |
          rm -f TermuxKeyboardApp.zip

      - name: Commit extracted files
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Extract Termux Keyboard project to root and remove zip"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi