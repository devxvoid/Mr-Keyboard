name: Create Base

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create base Gradle project
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/java/com/robot/mrkeyboard
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle <<'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "MrRobotKeyboard"
include(":app")
EOF

          cat > build.gradle <<'EOF'
plugins {
    id "com.android.application" version "8.5.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
}
EOF

      - name: Commit base files
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add settings.gradle build.gradle app
          git commit -m "Create MrRobot Keyboard base project" || echo "No changes"
          git push origin "HEAD:${GITHUB_REF_NAME}"
