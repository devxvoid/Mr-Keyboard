name: Build Termux Keyboard APK

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Android project in repo root
        shell: bash
        run: |
          set -e

          rm -rf app
          mkdir -p app/src/main/java/com/example/termuxkeyboard
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle <<'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = 'TermuxKeyboardApp'
include ':app'
EOF

          cat > build.gradle <<'EOF'
plugins {
    id 'com.android.application' version '8.5.2' apply false
}
EOF

          cat > app/build.gradle <<'EOF'
plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.termuxkeyboard'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.termuxkeyboard'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }
}
EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <application
        android:allowBackup="true"
        android:label="Termux Keyboard"
        android:theme="@style/AppTheme"
        android:supportsRtl="true">
        <service
            android:name=".TermuxKeyboardService"
            android:label="Termux Keyboard"
            android:permission="android.permission.BIND_INPUT_METHOD"
            android:exported="true">
            <intent-filter>
                <action android:name="android.view.InputMethod" />
            </intent-filter>
            <meta-data
                android:name="android.view.im"
                android:resource="@xml/method" />
        </service>
    </application>
</manifest>
EOF

          cat > app/src/main/res/xml/method.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<input-method xmlns:android="http://schemas.android.com/apk/res/android" />
EOF

          cat > app/src/main/res/values/styles.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<resources>
    <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar">
        <item name="android:windowNoTitle">true</item>
        <item name="android:windowActionBar">false</item>
        <item name="android:fontFamily">monospace</item>
        <item name="android:colorAccent">#00FF66</item>
    </style>
</resources>
EOF

          cat > app/src/main/res/drawable/key_hacker.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<selector xmlns:android="http://schemas.android.com/apk/res/android">
    <item android:state_pressed="true">
        <shape android:shape="rectangle">
            <solid android:color="#003B1F" />
            <stroke android:width="1dp" android:color="#00FF66" />
            <corners android:radius="10dp" />
        </shape>
    </item>
    <item android:state_selected="true">
        <shape android:shape="rectangle">
            <solid android:color="#003B1F" />
            <stroke android:width="1dp" android:color="#00FF66" />
            <corners android:radius="10dp" />
        </shape>
    </item>
    <item>
        <shape android:shape="rectangle">
            <solid android:color="#101010" />
            <stroke android:width="1dp" android:color="#143D24" />
            <corners android:radius="10dp" />
        </shape>
    </item>
</selector>
EOF

          cat > app/src/main/java/com/example/termuxkeyboard/TermuxKeyboardService.java <<'EOF'
package com.example.termuxkeyboard;

import android.inputmethodservice.InputMethodService;
import android.view.Gravity;
import android.view.KeyEvent;
import android.view.View;
import android.view.inputmethod.InputConnection;
import android.widget.Button;
import android.widget.LinearLayout;
import android.widget.TextView;

public class TermuxKeyboardService extends InputMethodService {

    private boolean ctrlPressed = false;
    private boolean altPressed = false;
    private Button ctrlButton;
    private Button altButton;

    @Override
    public View onCreateInputView() {
        LinearLayout root = new LinearLayout(this);
        root.setOrientation(LinearLayout.VERTICAL);
        root.setPadding(6, 6, 6, 6);
        root.setBackgroundColor(0xFF050505);

        TextView title = new TextView(this);
        title.setText("MR.ROBOT // TERMUX CONTROL BOARD");
        title.setTextColor(0xFF00FF66);
        title.setTextSize(11);
        title.setGravity(Gravity.CENTER_VERTICAL);
        title.setPadding(8, 0, 8, 0);
        root.addView(title, new LinearLayout.LayoutParams(
                LinearLayout.LayoutParams.MATCH_PARENT, 36
        ));

        LinearLayout row1 = row();
        Button esc = key("ESC");
        Button tab = key("TAB");
        ctrlButton = key("CTRL");
        altButton = key("ALT");
        Button slash = key("/");
        Button pipe = key("|");
        Button tilde = key("~");
        Button dollar = key("$");

        add(row1, esc, 1);
        add(row1, tab, 1);
        add(row1, ctrlButton, 1);
        add(row1, altButton, 1);
        add(row1, slash, 1);
        add(row1, pipe, 1);
        add(row1, tilde, 1);
        add(row1, dollar, 1);
        root.addView(row1);

        LinearLayout row2 = row();
        Button left = key("LEFT");
        Button down = key("DOWN");
        Button up = key("UP");
        Button right = key("RIGHT");
        Button enter = key("ENTER");

        add(row2, left, 1);
        add(row2, down, 1);
        add(row2, up, 1);
        add(row2, right, 1);
        add(row2, enter, 2);
        root.addView(row2);

        LinearLayout row3 = row();
        Button ctrlC = key("CTRL+C");
        Button ctrlD = key("CTRL+D");
        Button ctrlL = key("CTRL+L");

        add(row3, ctrlC, 1);
        add(row3, ctrlD, 1);
        add(row3, ctrlL, 1);
        root.addView(row3);

        LinearLayout row4 = row();
        Button ls = key("ls");
        Button cd = key("cd");
        Button clear = key("clear");
        Button pkg = key("pkg update");

        add(row4, ls, 1);
        add(row4, cd, 1);
        add(row4, clear, 1);
        add(row4, pkg, 2);
        root.addView(row4);

        esc.setOnClickListener(v -> sendKey(KeyEvent.KEYCODE_ESCAPE));
        tab.setOnClickListener(v -> sendKey(KeyEvent.KEYCODE_TAB));

        ctrlButton.setOnClickListener(v -> {
            ctrlPressed = !ctrlPressed;
            ctrlButton.setSelected(ctrlPressed);
        });

        altButton.setOnClickListener(v -> {
            altPressed = !altPressed;
            altButton.setSelected(altPressed);
        });

        slash.setOnClickListener(v -> commitText("/"));
        pipe.setOnClickListener(v -> commitText("|"));
        tilde.setOnClickListener(v -> commitText("~"));
        dollar.setOnClickListener(v -> commitText("$"));

        left.setOnClickListener(v -> sendKey(KeyEvent.KEYCODE_DPAD_LEFT));
        right.setOnClickListener(v -> sendKey(KeyEvent.KEYCODE_DPAD_RIGHT));
        up.setOnClickListener(v -> sendKey(KeyEvent.KEYCODE_DPAD_UP));
        down.setOnClickListener(v -> sendKey(KeyEvent.KEYCODE_DPAD_DOWN));
        enter.setOnClickListener(v -> sendKey(KeyEvent.KEYCODE_ENTER));

        ctrlC.setOnClickListener(v -> sendCtrlKey(KeyEvent.KEYCODE_C));
        ctrlD.setOnClickListener(v -> sendCtrlKey(KeyEvent.KEYCODE_D));
        ctrlL.setOnClickListener(v -> sendCtrlKey(KeyEvent.KEYCODE_L));

        ls.setOnClickListener(v -> commitText("ls "));
        cd.setOnClickListener(v -> commitText("cd "));
        clear.setOnClickListener(v -> {
            commitText("clear");
            sendKey(KeyEvent.KEYCODE_ENTER);
        });
        pkg.setOnClickListener(v -> commitText("pkg update && pkg upgrade"));

        return root;
    }

    private LinearLayout row() {
        LinearLayout layout = new LinearLayout(this);
        layout.setOrientation(LinearLayout.HORIZONTAL);
        layout.setPadding(0, 2, 0, 2);
        layout.setLayoutParams(new LinearLayout.LayoutParams(
                LinearLayout.LayoutParams.MATCH_PARENT, 54
        ));
        return layout;
    }

    private Button key(String text) {
        Button button = new Button(this);
        button.setText(text);
        button.setTextColor(0xFF00FF66);
        button.setTextSize(11);
        button.setAllCaps(false);
        button.setBackgroundResource(getResources().getIdentifier(
                "key_hacker",
                "drawable",
                getPackageName()
        ));
        button.setPadding(2, 0, 2, 0);
        return button;
    }

    private void add(LinearLayout row, Button button, int weight) {
        LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(
                0,
                LinearLayout.LayoutParams.MATCH_PARENT,
                weight
        );
        params.setMargins(2, 2, 2, 2);
        row.addView(button, params);
    }

    private void commitText(String text) {
        InputConnection ic = getCurrentInputConnection();
        if (ic != null) {
            ic.commitText(text, 1);
        }
    }

    private void sendKey(int keyCode) {
        InputConnection ic = getCurrentInputConnection();
        if (ic == null) return;

        int metaState = 0;

        if (ctrlPressed) {
            metaState |= KeyEvent.META_CTRL_ON | KeyEvent.META_CTRL_LEFT_ON;
        }

        if (altPressed) {
            metaState |= KeyEvent.META_ALT_ON | KeyEvent.META_ALT_LEFT_ON;
        }

        ic.sendKeyEvent(new KeyEvent(0, 0, KeyEvent.ACTION_DOWN, keyCode, 0, metaState));
        ic.sendKeyEvent(new KeyEvent(0, 0, KeyEvent.ACTION_UP, keyCode, 0, metaState));

        resetModifiers();
    }

    private void sendCtrlKey(int keyCode) {
        InputConnection ic = getCurrentInputConnection();
        if (ic == null) return;

        int metaState = KeyEvent.META_CTRL_ON | KeyEvent.META_CTRL_LEFT_ON;

        ic.sendKeyEvent(new KeyEvent(0, 0, KeyEvent.ACTION_DOWN, keyCode, 0, metaState));
        ic.sendKeyEvent(new KeyEvent(0, 0, KeyEvent.ACTION_UP, keyCode, 0, metaState));

        resetModifiers();
    }

    private void resetModifiers() {
        ctrlPressed = false;
        altPressed = false;

        if (ctrlButton != null) ctrlButton.setSelected(false);
        if (altButton != null) altButton.setSelected(false);
    }
}
EOF

      - name: Create Gradle wrapper
        shell: bash
        run: |
          set -e
          gradle wrapper --gradle-version 8.7

      - name: Build debug APK with logs
        shell: bash
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info 2>&1 | tee build-log.txt

      - name: Commit generated files to repo root
        if: always()
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add settings.gradle build.gradle app gradlew gradlew.bat gradle build-log.txt || true

          if git diff --cached --quiet; then
            echo "No generated file changes to commit."
          else
            git commit -m "Generate executable Termux Keyboard Android project"
            git push || true
          fi

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-build-logs
          path: build-log.txt

      - name: Upload generated source artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-source-root
          path: |
            settings.gradle
            build.gradle
            app
            gradle
            gradlew
            gradlew.bat
            build-log.txt