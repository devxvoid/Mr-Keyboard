name: Build MrRobot Keyboard APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Patch package and premium keyboard UI
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/java/com/robot/mrkeyboard
          rm -rf app/src/main/java/com/example

          cat > app/build.gradle <<'EOF'
plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.robot.mrkeyboard"
    compileSdk 35

    defaultConfig {
        applicationId "com.robot.mrkeyboard"
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName "3.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}
EOF

          cat > app/src/main/AndroidManifest.xml <<'EOF'
<?xml version="1.0" encoding="utf-8"?>
<manifest xmlns:android="http://schemas.android.com/apk/res/android">

    <uses-permission android:name="android.permission.VIBRATE" />

    <application
        android:allowBackup="true"
        android:label="MrRobot Keyboard"
        android:theme="@style/AppTheme"
        android:supportsRtl="true">

        <service
            android:name="com.robot.mrkeyboard.TermuxKeyboardService"
            android:label="MrRobot Keyboard"
            android:permission="android.permission.BIND_INPUT_METHOD"
            android:exported="true">

            <intent-filter>
                <action android:name="android.view.InputMethod" />
            </intent-filter>

            <meta-data
                android:name="android.view.im"
                android:resource="@xml/method" />
        </service>

    </application>
</manifest>
EOF

          cat > app/src/main/java/com/robot/mrkeyboard/TermuxKeyboardService.kt <<'EOF'
package com.robot.mrkeyboard

import android.graphics.Color
import android.graphics.Typeface
import android.inputmethodservice.InputMethodService
import android.view.Gravity
import android.view.KeyEvent
import android.view.View
import android.view.inputmethod.InputConnection
import android.widget.Button
import android.widget.LinearLayout
import android.widget.TextView

class TermuxKeyboardService : InputMethodService() {

    private var ctrlPressed = false
    private var altPressed = false
    private var shifted = false

    private var ctrlButton: Button? = null
    private var altButton: Button? = null
    private var shiftButton: Button? = null

    private val bg = Color.rgb(3, 6, 5)
    private val panel = Color.rgb(8, 15, 11)
    private val green = Color.rgb(0, 255, 102)
    private val softGreen = Color.rgb(0, 190, 80)

    override fun onCreateInputView(): View {
        val root = LinearLayout(this)
        root.orientation = LinearLayout.VERTICAL
        root.setPadding(dp(6), dp(6), dp(6), dp(6))
        root.setBackgroundColor(bg)

        val title = TextView(this)
        title.text = "MR.ROBOT // COMPLETE TERMINAL KEYBOARD"
        title.setTextColor(green)
        title.textSize = 10f
        title.typeface = Typeface.MONOSPACE
        title.gravity = Gravity.CENTER_VERTICAL
        title.setPadding(dp(8), 0, dp(8), 0)
        root.addView(title, LinearLayout.LayoutParams(LinearLayout.LayoutParams.MATCH_PARENT, dp(24)))

        val tools = row(38)
        addKey(tools, "ESC") { sendKey(KeyEvent.KEYCODE_ESCAPE) }
        addKey(tools, "TAB") { sendKey(KeyEvent.KEYCODE_TAB) }
        ctrlButton = addKey(tools, "CTRL") {
            ctrlPressed = !ctrlPressed
            ctrlButton?.isSelected = ctrlPressed
        }
        altButton = addKey(tools, "ALT") {
            altPressed = !altPressed
            altButton?.isSelected = altPressed
        }
        addKey(tools, "LEFT") { sendKey(KeyEvent.KEYCODE_DPAD_LEFT) }
        addKey(tools, "UP") { sendKey(KeyEvent.KEYCODE_DPAD_UP) }
        addKey(tools, "DOWN") { sendKey(KeyEvent.KEYCODE_DPAD_DOWN) }
        addKey(tools, "RIGHT") { sendKey(KeyEvent.KEYCODE_DPAD_RIGHT) }
        root.addView(tools)

        addTextRow(root, listOf("1","2","3","4","5","6","7","8","9","0"))
        addLetterRow(root, listOf("q","w","e","r","t","y","u","i","o","p"))
        addLetterRow(root, listOf("a","s","d","f","g","h","j","k","l"))

        val zrow = row(42)
        shiftButton = addKey(zrow, "SHIFT", 1.45f) {
            shifted = !shifted
            shiftButton?.isSelected = shifted
        }
        listOf("z","x","c","v","b","n","m").forEach { value ->
            addKey(zrow, value.uppercase()) { commitLetter(value[0]) }
        }
        addKey(zrow, "DEL", 1.45f) { backspace() }
        root.addView(zrow)

        val symbols = row(40)
        listOf("/", "|", "~", "$", "-", "_", ".", ":", "@").forEach { value ->
            addKey(symbols, value) { commitText(value) }
        }
        root.addView(symbols)

        val action = row(42)
        addKey(action, "CTRL+C", 1.3f) { sendCtrlKey(KeyEvent.KEYCODE_C) }
        addKey(action, "CTRL+D", 1.3f) { sendCtrlKey(KeyEvent.KEYCODE_D) }
        addKey(action, "SPACE", 4f) { commitText(" ") }
        addKey(action, "ENTER", 1.8f) { sendKey(KeyEvent.KEYCODE_ENTER) }
        root.addView(action)

        val commands = row(40)
        addKey(commands, "ls") { commitText("ls ") }
        addKey(commands, "cd") { commitText("cd ") }
        addKey(commands, "clear") {
            commitText("clear")
            sendKey(KeyEvent.KEYCODE_ENTER)
        }
        addKey(commands, "pkg update", 2f) {
            commitText("pkg update && pkg upgrade")
        }
        root.addView(commands)

        return root
    }

    private fun addTextRow(root: LinearLayout, items: List<String>) {
        val r = row(40)
        items.forEach { value -> addKey(r, value) { commitText(value) } }
        root.addView(r)
    }

    private fun addLetterRow(root: LinearLayout, items: List<String>) {
        val r = row(42)
        items.forEach { value -> addKey(r, value.uppercase()) { commitLetter(value[0]) } }
        root.addView(r)
    }

    private fun row(height: Int): LinearLayout {
        val layout = LinearLayout(this)
        layout.orientation = LinearLayout.HORIZONTAL
        layout.setPadding(0, dp(1), 0, dp(1))
        layout.layoutParams = LinearLayout.LayoutParams(
            LinearLayout.LayoutParams.MATCH_PARENT,
            dp(height)
        )
        return layout
    }

    private fun addKey(
        row: LinearLayout,
        label: String,
        weight: Float = 1f,
        action: () -> Unit
    ): Button {
        val button = Button(this)
        button.text = label
        button.setTextColor(green)
        button.textSize = 9.5f
        button.typeface = Typeface.MONOSPACE
        button.isAllCaps = false
        button.setPadding(0, 0, 0, 0)
        button.setBackgroundColor(panel)
        button.setOnClickListener { action() }

        val params = LinearLayout.LayoutParams(
            0,
            LinearLayout.LayoutParams.MATCH_PARENT,
            weight
        )
        params.setMargins(dp(2), dp(1), dp(2), dp(1))
        row.addView(button, params)

        return button
    }

    private fun commitLetter(char: Char) {
        val keyCode = keyCodeForLetter(char)

        if (ctrlPressed && keyCode != null) {
            sendKey(keyCode)
            return
        }

        val output = if (shifted) {
            char.uppercaseChar().toString()
        } else {
            char.lowercaseChar().toString()
        }

        commitText(output)

        if (shifted) {
            shifted = false
            shiftButton?.isSelected = false
        }
    }

    private fun commitText(text: String) {
        currentInputConnection?.commitText(text, 1)
    }

    private fun backspace() {
        currentInputConnection?.deleteSurroundingText(1, 0)
    }

    private fun sendKey(keyCode: Int) {
        val ic: InputConnection = currentInputConnection ?: return

        var meta = 0

        if (ctrlPressed) {
            meta = meta or KeyEvent.META_CTRL_ON or KeyEvent.META_CTRL_LEFT_ON
        }

        if (altPressed) {
            meta = meta or KeyEvent.META_ALT_ON or KeyEvent.META_ALT_LEFT_ON
        }

        ic.sendKeyEvent(KeyEvent(0, 0, KeyEvent.ACTION_DOWN, keyCode, 0, meta))
        ic.sendKeyEvent(KeyEvent(0, 0, KeyEvent.ACTION_UP, keyCode, 0, meta))

        resetModifiers()
    }

    private fun sendCtrlKey(keyCode: Int) {
        val ic: InputConnection = currentInputConnection ?: return
        val meta = KeyEvent.META_CTRL_ON or KeyEvent.META_CTRL_LEFT_ON

        ic.sendKeyEvent(KeyEvent(0, 0, KeyEvent.ACTION_DOWN, keyCode, 0, meta))
        ic.sendKeyEvent(KeyEvent(0, 0, KeyEvent.ACTION_UP, keyCode, 0, meta))

        resetModifiers()
    }

    private fun resetModifiers() {
        ctrlPressed = false
        altPressed = false
        ctrlButton?.isSelected = false
        altButton?.isSelected = false
    }

    private fun keyCodeForLetter(char: Char): Int? {
        return when (char.lowercaseChar()) {
            'a' -> KeyEvent.KEYCODE_A
            'b' -> KeyEvent.KEYCODE_B
            'c' -> KeyEvent.KEYCODE_C
            'd' -> KeyEvent.KEYCODE_D
            'e' -> KeyEvent.KEYCODE_E
            'f' -> KeyEvent.KEYCODE_F
            'g' -> KeyEvent.KEYCODE_G
            'h' -> KeyEvent.KEYCODE_H
            'i' -> KeyEvent.KEYCODE_I
            'j' -> KeyEvent.KEYCODE_J
            'k' -> KeyEvent.KEYCODE_K
            'l' -> KeyEvent.KEYCODE_L
            'm' -> KeyEvent.KEYCODE_M
            'n' -> KeyEvent.KEYCODE_N
            'o' -> KeyEvent.KEYCODE_O
            'p' -> KeyEvent.KEYCODE_P
            'q' -> KeyEvent.KEYCODE_Q
            'r' -> KeyEvent.KEYCODE_R
            's' -> KeyEvent.KEYCODE_S
            't' -> KeyEvent.KEYCODE_T
            'u' -> KeyEvent.KEYCODE_U
            'v' -> KeyEvent.KEYCODE_V
            'w' -> KeyEvent.KEYCODE_W
            'x' -> KeyEvent.KEYCODE_X
            'y' -> KeyEvent.KEYCODE_Y
            'z' -> KeyEvent.KEYCODE_Z
            else -> null
        }
    }

    private fun dp(value: Int): Int {
        return (value * resources.displayMetrics.density).toInt()
    }
}
EOF

      - name: Build APK with logs
        shell: bash
        run: |
          set -o pipefail
          gradle clean assembleDebug --stacktrace --info 2>&1 | tee build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mrrobot-keyboard-pro-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mrrobot-keyboard-build-logs
          path: build-log.txt
