name: Build Termux Keyboard APK

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle (fallback safe)
        run: |
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Generate Gradle Wrapper (CRITICAL FIX)
        run: |
          gradle wrapper --gradle-version 8.7

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build APK with logs
        run: |
          set -o pipefail
          ./gradlew clean assembleDebug --stacktrace --info | tee build-log.txt

      - name: Verify APK exists
        run: |
          ls -la app/build/outputs/apk/debug || true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-log.txt
