name: Build MrRobot Keyboard APK

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Rename package + fix project
        shell: bash
        run: |
          set -e

          # Create new package folder
          mkdir -p app/src/main/java/com/robot/mrkeyboard

          # Move Kotlin file if exists
          if [ -f app/src/main/java/com/example/termuxkeyboard/TermuxKeyboardService.kt ]; then
            mv app/src/main/java/com/example/termuxkeyboard/TermuxKeyboardService.kt app/src/main/java/com/robot/mrkeyboard/
            rm -rf app/src/main/java/com/example
          fi

          # Update package name in Kotlin file
          sed -i 's/package com.example.termuxkeyboard/package com.robot.mrkeyboard/g' app/src/main/java/com/robot/mrkeyboard/TermuxKeyboardService.kt

          # Update Manifest
          sed -i 's/com.example.termuxkeyboard/com.robot.mrkeyboard/g' app/src/main/AndroidManifest.xml

          # Rewrite build.gradle
          cat > app/build.gradle <<'EOF'
plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.robot.mrkeyboard"
    compileSdk 35

    defaultConfig {
        applicationId "com.robot.mrkeyboard"
        minSdk 23
        targetSdk 35
        versionCode 2
        versionName "2.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}
EOF

      - name: Build APK
        shell: bash
        run: |
          set -o pipefail
          gradle clean assembleDebug --stacktrace --info 2>&1 | tee build-log.txt

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mrrobot-keyboard-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-log.txt
