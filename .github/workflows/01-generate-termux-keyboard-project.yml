name: 01 Generate Termux Keyboard Project

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    name: Generate Project Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate complete Android project in repo root
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p app/src/main/java/com/example/termuxkeyboard
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          cat > settings.gradle <<'EOF'
pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
    }
}

rootProject.name = "TermuxKeyboardApp"
include(":app")
EOF

          cat > build.gradle <<'EOF'
plugins {
    id "com.android.application" version "8.5.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
}
EOF

          cat > app/build.gradle <<'EOF'
plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.example.termuxkeyboard"
    compileSdk 35

    defaultConfig {
        applicationId "com.example.termuxkeyboard"
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName "1.0"
    }
}
EOF

