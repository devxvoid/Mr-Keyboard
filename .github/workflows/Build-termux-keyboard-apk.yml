name: Build Termux Keyboard APK

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Fix JVM target mismatch
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path

          path = Path("app/build.gradle")
          text = path.read_text()

          if "compileOptions" not in text:
              text = text.replace(
                  "    defaultConfig {\n"
                  "        applicationId \"com.example.termuxkeyboard\"\n"
                  "        minSdk 23\n"
                  "        targetSdk 35\n"
                  "        versionCode 1\n"
                  "        versionName \"1.0\"\n"
                  "    }\n",
                  "    defaultConfig {\n"
                  "        applicationId \"com.example.termuxkeyboard\"\n"
                  "        minSdk 23\n"
                  "        targetSdk 35\n"
                  "        versionCode 1\n"
                  "        versionName \"1.0\"\n"
                  "    }\n\n"
                  "    compileOptions {\n"
                  "        sourceCompatibility JavaVersion.VERSION_17\n"
                  "        targetCompatibility JavaVersion.VERSION_17\n"
                  "    }\n\n"
                  "    kotlinOptions {\n"
                  "        jvmTarget = \"17\"\n"
                  "    }\n"
              )

          path.write_text(text)
          PY

      - name: Build APK with logs
        shell: bash
        run: |
          set -o pipefail
          gradle clean assembleDebug --stacktrace --info 2>&1 | tee build-log.txt

      - name: Verify APK exists
        shell: bash
        run: |
          ls -la app/build/outputs/apk/debug
          test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-build-logs
          path: build-log.txt
