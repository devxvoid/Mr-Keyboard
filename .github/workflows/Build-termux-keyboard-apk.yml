name: Build MrRobot Keyboard v5 APK

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "build.gradle"
      - "settings.gradle"

permissions:
  contents: read

jobs:
  build:
    name: Build MrRobot Keyboard v5 APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Clean old legacy keyboard XML
        shell: bash
        run: |
          set -euo pipefail

          rm -f app/src/main/res/layout/keyboard_view.xml

      - name: Verify v5 project files
        shell: bash
        run: |
          set -euo pipefail

          test -f settings.gradle
          test -f build.gradle
          test -f app/build.gradle
          test -f app/src/main/AndroidManifest.xml
          test -f app/src/main/java/com/robot/mrkeyboard/TermuxKeyboardService.kt
          test -f app/src/main/java/com/robot/mrkeyboard/SettingsActivity.kt
          test -f app/src/main/java/com/robot/mrkeyboard/KeyboardPrefs.kt
          test -f app/src/main/java/com/robot/mrkeyboard/KeyboardTheme.kt
          test -f app/src/main/java/com/robot/mrkeyboard/MacroRepository.kt
          test -f app/src/main/java/com/robot/mrkeyboard/PredictionEngine.kt

          grep -q 'namespace "com.robot.mrkeyboard"' app/build.gradle
          grep -q 'applicationId "com.robot.mrkeyboard"' app/build.gradle

      - name: Build APK with logs
        shell: bash
        run: |
          set -o pipefail
          gradle clean assembleDebug --stacktrace --info 2>&1 | tee build-log.txt

      - name: Verify APK exists
        shell: bash
        run: |
          ls -la app/build/outputs/apk/debug
          test -f app/build/outputs/apk/debug/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mrrobot-keyboard-v5-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mrrobot-keyboard-v5-build-logs
          path: build-log.txt
