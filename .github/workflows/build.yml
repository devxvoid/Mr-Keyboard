name: Build Termux Keyboard APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Generate and Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate Android project files
        run: |
          chmod +x generate_project.sh
          ./generate_project.sh

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: termux-keyboard-app
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-debug-apk
          path: termux-keyboard-app/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload source project artifact
        uses: actions/upload-artifact@v4
        with:
          name: termux-keyboard-source
          path: termux-keyboard-app
