name: Android Release

on:
  push:
    tags:
      - 'v*'          # e.g., v1.0.0, v5.0, etc.

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Make Gradle executable
        run: chmod +x gradlew

      # Build release APK – adjust task if your module name or variant differs
      - name: Build release APK
        run: ./gradlew clean assembleRelease

      # Create ZIP of the repository source at this commit
      - name: Create source ZIP
        run: |
          zip -r mr-keyboard-source.zip . \
            -x ".git/*" \
               ".github/*" \
               "**/build/*"

      # Collect paths for artifacts
      - name: Find built APK
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk -name "*release*.apk" | head -n 1)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT

      # Create GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Mr-Keyboard ${{ github.ref_name }}
          draft: false
          prerelease: false

      # Upload APK to release
      - name: Upload APK asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.apk.outputs.apk_path }}
          asset_name: mr-keyboard-${{ github.ref_name }}.apk
          asset_content_type: application/vnd.android.package-archive

      # Upload source ZIP to release
      - name: Upload source ZIP asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: mr-keyboard-source.zip
          asset_name: mr-keyboard-${{ github.ref_name }}-source.zip
          asset_content_type: application/zip
