name: Update MrRobot Keyboard Files

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update project
        run: |
          set -e

          rm -rf app/src/main/java/com/example
          mkdir -p app/src/main/java/com/robot/mrkeyboard
          mkdir -p app/src/main/res/xml
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/drawable

          echo 'rootProject.name="MrRobotKeyboard"' > settings.gradle

          cat > build.gradle <<EOF
plugins {
    id "com.android.application" version "8.5.2" apply false
    id "org.jetbrains.kotlin.android" version "1.9.24" apply false
}
EOF

          cat > app/build.gradle <<EOF
plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"
}

android {
    namespace "com.robot.mrkeyboard"
    compileSdk 35

    defaultConfig {
        applicationId "com.robot.mrkeyboard"
        minSdk 23
        targetSdk 35
        versionCode 3
        versionName "3.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}
EOF

          cat > app/src/main/AndroidManifest.xml <<EOF
<manifest xmlns:android="http://schemas.android.com/apk/res/android">
    <application
        android:label="MrRobot Keyboard"
        android:theme="@style/AppTheme">

        <service
            android:name="com.robot.mrkeyboard.TermuxKeyboardService"
            android:permission="android.permission.BIND_INPUT_METHOD"
            android:exported="true">

            <intent-filter>
                <action android:name="android.view.InputMethod"/>
            </intent-filter>

            <meta-data
                android:name="android.view.im"
                android:resource="@xml/method"/>
        </service>

    </application>
</manifest>
EOF

          cat > app/src/main/res/xml/method.xml <<EOF
<input-method xmlns:android="http://schemas.android.com/apk/res/android"/>
EOF

          cat > app/src/main/res/values/styles.xml <<EOF
<resources>
    <style name="AppTheme" parent="android:style/Theme.Material.NoActionBar"/>
</resources>
EOF

          cat > app/src/main/res/drawable/key_hacker.xml <<EOF
<shape xmlns:android="http://schemas.android.com/apk/res/android">
    <solid android:color="#08100C"/>
    <stroke android:width="1dp" android:color="#00FF66"/>
    <corners android:radius="10dp"/>
</shape>
EOF

          cat > app/src/main/java/com/robot/mrkeyboard/TermuxKeyboardService.kt <<EOF
package com.robot.mrkeyboard

import android.inputmethodservice.InputMethodService
import android.view.View
import android.widget.TextView

class TermuxKeyboardService : InputMethodService() {
    override fun onCreateInputView(): View {
        return TextView(this).apply {
            text = "MrRobot Keyboard Loaded"
        }
    }
}
EOF

      - name: Commit changes
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "Update keyboard base files" || echo "No changes"
          git push
